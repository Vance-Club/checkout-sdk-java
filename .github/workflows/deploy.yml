name: Publishing checkout-fork-sdk on github packages
on:
  push:
    branches: [ master, develop, ci/test-arc-runner ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Image to ECR
    runs-on: [ core-stage-arc-runner-amd64 ]
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/wrapper-validation-action@v3

      - name: Build and publish JAR
        run: |
          ./gradlew clean build publish -x test
        env:
          GITHUB_USERNAME: ${{ secrets.ACTION_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
